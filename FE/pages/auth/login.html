<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MARC Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        :root {
            --primary-color: #DC3545;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --bg-light: #F8F7F4;
            --accent-gold: #D4AF37;
            --white: #FFFFFF;
            --border-color: #E8E8E8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f7f0eb 0%, #f1ece6 100%);
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 100vh;
            padding: 24px;
            align-items: stretch;
        }

        .auth-container > div {
            min-height: calc(100vh - 48px);
        }

        .auth-image {
            background: linear-gradient(135deg, var(--primary-color) 0%, #a02834 100%);
            background-image: url('../../assets/images/login.png');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 28px 0 0 28px;
            overflow: hidden;
        }

        .auth-image h2 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .auth-image p {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .auth-form-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--white);
            border-radius: 0 28px 28px 0;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.12);
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 24px 0;
        }

        .back-home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 4px;
            background: var(--secondary-color, var(--text-dark));
            border: none;
            color: var(--white);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 18px;
        }

        .back-home-link:hover {
            background: #1a1f2e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.25);
        }

        .auth-form-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .auth-form-subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .form-remember {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .form-remember a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-remember a:hover {
            color: #a02834;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: #a02834;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            gap: 12px;
            color: var(--text-light);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--white);
            color: var(--text-dark);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(220, 53, 69, 0.05);
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #a02834;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border: 1px solid #f5c6cb;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .auth-image {
                display: none;
            }

            .auth-form-container {
                padding: 20px;
                border-radius: 24px;
                min-height: calc(100vh - 32px);
            }

            .auth-form-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-image">
            <div>
                <h2>MARC</h2>
                <p>Chào mừng bạn quay trở lại</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <h1 class="auth-form-title">Đăng nhập</h1>
                <p class="auth-form-subtitle">Truy cập vào tài khoản của bạn</p>

                <div id="errorMessage" class="error-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="form-group">
                        <label>Mật Khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    </div>

                    <div class="form-remember">
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 400; text-transform: none; letter-spacing: 0;">
                            <input type="checkbox" style="cursor: pointer;">
                            Nhớ mật khẩu
                        </label>
                        <a href="forgetpassword.html">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">Đăng Nhập</button>
                </form>

                <div class="auth-footer">
                    Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                </div>
                <a class="back-home-link" href="../customer/index.html">
                    <i class="fas fa-arrow-left"></i>
                    <span>Về Trang Chủ</span>
                </a>
            </div>
        </div>
    </div>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script src="../../js/customer/auth.js"></script>
</body>
</html>
