<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - MARC Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        :root {
            --primary-color: #DC3545;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --bg-light: #F8F7F4;
            --white: #FFFFFF;
            --border-color: #E8E8E8;
            --success: #155724;
            --success-bg: #d4edda;
            --error: #721c24;
            --error-bg: #f8d7da;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f7f0eb 0%, #f1ece6 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
        }

        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: min(100%, 520px);
            background: var(--white);
            border-radius: 28px;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.12);
            padding: 40px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--primary-color);
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 10px;
            font-family: 'Playfair Display', serif;
            font-size: 34px;
        }

        .subtitle {
            margin: 0 0 28px;
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.7;
        }

        .message-box {
            display: none;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .message-box.show { display: block; }
        .message-box.success { background: var(--success-bg); color: var(--success); }
        .message-box.error { background: var(--error-bg); color: var(--error); }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 999px;
            background: var(--primary-color);
            color: var(--white);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .aux-links {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .aux-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="eyebrow">MARC Fashion</div>
            <h1 id="pageTitle">Quên mật khẩu</h1>
            <p id="pageSubtitle" class="subtitle">Nhập email đăng nhập để nhận liên kết đặt lại mật khẩu qua email.</p>

            <div id="messageBox" class="message-box"></div>

            <form id="requestForm">
                <div class="form-group">
                    <label for="requestEmail">Email</label>
                    <input type="email" id="requestEmail" placeholder="Nhập email của bạn" required>
                </div>
                <button type="submit" id="requestBtn" class="btn-primary">Gửi liên kết đặt lại</button>
            </form>

            <form id="resetForm" class="hidden">
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" minlength="6" required>
                </div>
                <button type="submit" id="resetBtn" class="btn-primary">Cập nhật mật khẩu</button>
            </form>

            <div class="aux-links">
                <a href="login.html">Quay lại đăng nhập</a>
                <a href="../customer/index.html">Về trang chủ</a>
            </div>
        </section>
    </main>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script>
        const queryParams = new URLSearchParams(window.location.search);
        const resetToken = queryParams.get('token') || '';

        function setMessage(message = '', type = '') {
            const box = document.getElementById('messageBox');
            if (!message) {
                box.className = 'message-box';
                box.textContent = '';
                return;
            }

            box.className = `message-box show ${type}`;
            box.textContent = message;
        }

        function setMode() {
            const requestForm = document.getElementById('requestForm');
            const resetForm = document.getElementById('resetForm');
            const pageTitle = document.getElementById('pageTitle');
            const pageSubtitle = document.getElementById('pageSubtitle');

            if (resetToken) {
                requestForm.classList.add('hidden');
                resetForm.classList.remove('hidden');
                pageTitle.textContent = 'Đặt lại mật khẩu';
                pageSubtitle.textContent = 'Nhập mật khẩu mới cho tài khoản của bạn. Liên kết trong email chỉ có hiệu lực trong thời gian ngắn.';
                return;
            }

            requestForm.classList.remove('hidden');
            resetForm.classList.add('hidden');
            pageTitle.textContent = 'Quên mật khẩu';
            pageSubtitle.textContent = 'Nhập email đăng nhập để nhận liên kết đặt lại mật khẩu qua email.';
        }

        async function handleRequestSubmit(event) {
            event.preventDefault();
            const button = document.getElementById('requestBtn');

            try {
                button.disabled = true;
                setMessage('Đang gửi yêu cầu...', 'success');
                const response = await window.AuthAPI.forgotPassword({
                    email: document.getElementById('requestEmail').value.trim()
                });
                setMessage(response.message || 'Nếu email tồn tại, chúng tôi đã gửi liên kết đặt lại mật khẩu.', 'success');
            } catch (error) {
                setMessage(error.message || 'Không thể gửi yêu cầu đặt lại mật khẩu.', 'error');
            } finally {
                button.disabled = false;
            }
        }

        async function handleResetSubmit(event) {
            event.preventDefault();
            const button = document.getElementById('resetBtn');

            try {
                button.disabled = true;
                setMessage('Đang cập nhật mật khẩu...', 'success');
                const response = await window.AuthAPI.resetPassword({
                    token: resetToken,
                    password: document.getElementById('newPassword').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                });
                setMessage(response.message || 'Đặt lại mật khẩu thành công. Đang chuyển về trang đăng nhập...', 'success');
                window.setTimeout(() => {
                    window.location.replace('login.html');
                }, 1800);
            } catch (error) {
                setMessage(error.message || 'Không thể đặt lại mật khẩu.', 'error');
            } finally {
                button.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            setMode();
            document.getElementById('requestForm').addEventListener('submit', handleRequestSubmit);
            document.getElementById('resetForm').addEventListener('submit', handleResetSubmit);
        });
    </script>
</body>
</html>
