<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - MARC Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        :root {
            --primary-color: #DC3545;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --bg-light: #F8F7F4;
            --accent-gold: #D4AF37;
            --white: #FFFFFF;
            --border-color: #E8E8E8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f7f0eb 0%, #f1ece6 100%);
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 100vh;
            padding: 24px;
            align-items: stretch;
        }

        .auth-container > div {
            min-height: calc(100vh - 48px);
        }

        .auth-image {
            background: linear-gradient(135deg, var(--primary-color) 0%, #a02834 100%);
            background-image: url('../../assets/images/register.png');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 28px 0 0 28px;
            overflow: hidden;
        }

        .auth-image h2 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .auth-image p {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .auth-form-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--white);
            overflow-y: auto;
            max-height: calc(100vh - 48px);
            border-radius: 0 28px 28px 0;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.12);
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
        }

        .back-home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 4px;
            background: var(--secondary-color, var(--text-dark));
            border: none;
            color: var(--white);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 18px;
        }

        .back-home-link:hover {
            background: #1a1f2e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.25);
        }

        .auth-form-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .auth-form-subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row .form-group {
            margin-bottom: 12px;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-light);
        }

        .form-checkbox input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .form-checkbox label {
            cursor: pointer;
            text-transform: none;
            font-weight: 400;
            letter-spacing: 0;
            margin: 0;
            text-transform: none;
        }

        .form-checkbox a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .form-checkbox a:hover {
            color: #a02834;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .btn-register:hover {
            background: #a02834;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #a02834;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border: 1px solid #f5c6cb;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .auth-image {
                display: none;
            }

            .auth-form-container {
                padding: 20px;
                border-radius: 24px;
                min-height: calc(100vh - 32px);
                max-height: none;
            }

            .auth-form-title {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-image">
            <div>
                <h2>MARC</h2>
                <p>Tham gia cộng đồng thời trang của chúng tôi</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <h1 class="auth-form-title">Đăng Ký</h1>
                <p class="auth-form-subtitle">Tạo tài khoản mới của bạn</p>

                <div id="errorMessage" class="error-message"></div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ Tên</label>
                            <input type="text" id="fullname" placeholder="Nhập họ tên" required>
                        </div>
                        <div class="form-group">
                            <label>Điện Thoại</label>
                            <input type="tel" id="phone" placeholder="0901234567" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Nhập email" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Mật Khẩu</label>
                            <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required>
                        </div>
                        <div class="form-group">
                            <label>Xác Nhận</label>
                            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="agreeTerms" required>
                        <label for="agreeTerms">Tôi đồng ý với <a href="#">Điều Khoản & Dịch Vụ</a></label>
                    </div>

                    <button type="submit" class="btn-register">Đăng Ký</button>
                </form>

                <div class="auth-footer">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
                <a class="back-home-link" href="../customer/index.html">
                    <i class="fas fa-arrow-left"></i>
                    <span>Về Trang Chủ</span>
                </a>
            </div>
        </div>
    </div>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script src="../../js/customer/auth.js"></script>
</body>
</html>
