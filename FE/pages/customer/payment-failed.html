<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán Thất Bại - MARC Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/components.css">
    <style>
        :root {
            --danger: #c6473b;
            --danger-soft: #fdeceb;
            --text-dark: #2C3E50;
            --text-light: #6c7a89;
            --surface: rgba(255,255,255,0.95);
            --background: linear-gradient(180deg, #f6efef 0%, #f8f7f4 100%);
            --border: #ead9d6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            background: var(--background);
        }

        .wrap {
            max-width: 860px;
            margin: 44px auto 80px;
            padding: 0 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 20px 56px rgba(88, 48, 41, 0.12);
            overflow: hidden;
        }

        .hero {
            padding: 42px 28px 26px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--danger-soft);
            color: var(--danger);
            font-size: 34px;
        }

        h1 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            font-size: 34px;
        }

        .subtitle {
            margin: 12px auto 0;
            max-width: 580px;
            color: var(--text-light);
            font-size: 15px;
        }

        .body {
            padding: 28px;
        }

        .message-box {
            padding: 16px 18px;
            border-radius: 18px;
            background: #fff7f7;
            border: 1px solid #f0d2cf;
            color: #8b3b33;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .meta {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 13px;
        }

        .meta-row:last-child { border-bottom: none; }

        .meta-row span:last-child { font-weight: 600; text-align: right; }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .actions a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 190px;
            padding: 13px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--danger);
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            color: var(--text-dark);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <main class="wrap">
        <section class="card">
            <div class="hero">
                <div class="icon"><i class="fas fa-times"></i></div>
                <h1 id="failedTitle">Thanh toán chưa thành công</h1>
                <p id="failedSubtitle" class="subtitle">Giao dịch chưa hoàn tất. Giỏ hàng của bạn vẫn được giữ nguyên để bạn có thể thử lại.</p>
            </div>

            <div class="body">
                <div class="message-box" id="failureMessage">Đã xảy ra lỗi trong quá trình thanh toán.</div>

                <div class="meta" id="failureMeta">
                    <div class="meta-row"><span>Mã đơn hàng</span><span>Không có</span></div>
                    <div class="meta-row"><span>Phương thức</span><span>VNPAY</span></div>
                    <div class="meta-row"><span>Trạng thái</span><span>Thất bại</span></div>
                </div>

                <div class="actions">
                    <a id="retryAction" href="checkout.html" class="btn-primary">Thử thanh toán lại</a>
                    <a href="cart.html" class="btn-secondary">Quay về giỏ hàng</a>
                    <a id="orderHistoryAction" href="order-history.html" class="btn-secondary">Xem đơn hàng</a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script src="../../js/components/load-components.js"></script>
    <script src="../../js/shared.js"></script>
    <script>
        function getParam(key) {
            return new URLSearchParams(window.location.search).get(key) || '';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadCommonComponents();
            updateCartBadge();
            updateWishlistBadge();
            updateHeaderAuth();

            const orderId = getParam('orderId');
            const paymentMethod = String(getParam('paymentMethod') || 'vnpay').toLowerCase();
            const message = getParam('message') || 'Đã xảy ra lỗi trong quá trình thanh toán.';

            document.getElementById('failedTitle').textContent = paymentMethod === 'cod' ? 'Đặt hàng chưa thành công' : 'Thanh toán chưa thành công';
            document.getElementById('failedSubtitle').textContent = paymentMethod === 'cod'
                ? 'Đơn hàng chưa được tạo thành công. Vui lòng kiểm tra lại thông tin và thử lại.'
                : 'Giao dịch chưa hoàn tất. Đơn hàng sẽ chưa được hiển thị cho tới khi thanh toán thành công.';
            document.getElementById('retryAction').textContent = paymentMethod === 'cod' ? 'Thử đặt hàng lại' : 'Thử thanh toán lại';
            document.getElementById('orderHistoryAction').style.display = 'none';

            document.getElementById('failureMessage').textContent = message;
            document.getElementById('failureMeta').innerHTML = `
                <div class="meta-row"><span>Mã đơn hàng</span><span>${escapeHtml(orderId || 'Không có')}</span></div>
                <div class="meta-row"><span>Phương thức</span><span>${escapeHtml(String(paymentMethod).toUpperCase())}</span></div>
                <div class="meta-row"><span>Trạng thái</span><span>${escapeHtml(getParam('paymentStatus') || 'failed')}</span></div>
            `;
        });
    </script>
</body>
</html>
