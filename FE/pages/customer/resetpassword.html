<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu - MARC Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/components.css">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #f8f3ed 0%, #f8f7f4 100%);
            color: #2C3E50;
        }

        .password-shell {
            max-width: 760px;
            margin: 40px auto 80px;
            padding: 0 20px;
        }

        .password-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #e7dfd6;
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(67, 54, 39, 0.12);
            overflow: hidden;
        }

        .password-hero {
            padding: 34px 32px 24px;
            border-bottom: 1px solid #eee2d7;
            background: linear-gradient(135deg, #fff4eb 0%, #fffdf9 100%);
        }

        .password-hero h1 {
            margin: 0 0 10px;
            font-family: 'Playfair Display', serif;
            font-size: 34px;
        }

        .password-hero p {
            margin: 0;
            color: #6c7a89;
            line-height: 1.7;
            font-size: 14px;
        }

        .password-body {
            padding: 28px 32px 34px;
        }

        .message-box {
            display: none;
            margin-bottom: 18px;
            padding: 13px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .message-box.show { display: block; }
        .message-box.success { background: #d4edda; color: #155724; }
        .message-box.error { background: #f8d7da; color: #721c24; }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #e1d8cf;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #DC3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .btn-link,
        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            padding: 13px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-submit {
            border: none;
            background: #DC3545;
            color: #fff;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-link {
            border: 1px solid #e1d8cf;
            background: #fff;
            color: #2C3E50;
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <main class="password-shell">
        <section class="password-card">
            <div class="password-hero">
                <h1>Đổi mật khẩu</h1>
                <p>Cập nhật mật khẩu mới cho tài khoản của bạn. Mật khẩu mới phải có ít nhất 6 ký tự và khác mật khẩu hiện tại.</p>
            </div>

            <div class="password-body">
                <div id="messageBox" class="message-box"></div>

                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="currentPassword">Mật khẩu hiện tại</label>
                        <input type="password" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới</label>
                        <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" minlength="6" required>
                    </div>

                    <div class="actions">
                        <button type="submit" id="submitBtn" class="btn-submit">Lưu mật khẩu mới</button>
                        <a href="profile.html" class="btn-link">Quay lại hồ sơ</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script src="../../js/components/load-components.js"></script>
    <script src="../../js/shared.js"></script>
    <script>
        function ensureCustomerAccount() {
            const user = window.getStoredUser?.();
            if (!user) {
                window.location.replace('../auth/login.html');
                return false;
            }

            if (user.role === 'admin') {
                window.location.replace('../admin/dashboard.html');
                return false;
            }

            return true;
        }

        function persistAuthState(data) {
            if (!data || typeof data !== 'object') {
                return;
            }

            if (data.accessToken) {
                localStorage.setItem(window.CONFIG.STORAGE_KEYS.AUTH_TOKEN, data.accessToken);
                localStorage.setItem('authToken', data.accessToken);
            }

            if (data.refreshToken) {
                localStorage.setItem(window.CONFIG.STORAGE_KEYS.REFRESH_TOKEN, data.refreshToken);
                localStorage.setItem('refreshToken', data.refreshToken);
            }

            if (data.user) {
                const serializedUser = JSON.stringify(data.user);
                localStorage.setItem(window.CONFIG.STORAGE_KEYS.USER_INFO, serializedUser);
                localStorage.setItem('userInfo', serializedUser);
                localStorage.setItem('user', serializedUser);
                window.storeUserInfo?.(data.user);
            }
        }

        function setMessage(message = '', type = '') {
            const box = document.getElementById('messageBox');
            if (!message) {
                box.className = 'message-box';
                box.textContent = '';
                return;
            }

            box.className = `message-box show ${type}`;
            box.textContent = message;
        }

        async function handleSubmit(event) {
            event.preventDefault();

            if (!ensureCustomerAccount()) {
                return;
            }

            const button = document.getElementById('submitBtn');

            try {
                button.disabled = true;
                setMessage('Đang cập nhật mật khẩu...', 'success');
                const response = await window.AuthAPI.changePassword({
                    currentPassword: document.getElementById('currentPassword').value,
                    newPassword: document.getElementById('newPassword').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                });
                persistAuthState(response);
                updateHeaderAuth();
                setMessage(response.message || 'Đổi mật khẩu thành công.', 'success');
                document.getElementById('changePasswordForm').reset();
            } catch (error) {
                setMessage(error.message || 'Không thể đổi mật khẩu.', 'error');
            } finally {
                button.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadCommonComponents();
            updateCartBadge();
            updateWishlistBadge();
            updateHeaderAuth();

            if (!ensureCustomerAccount()) {
                return;
            }

            document.getElementById('changePasswordForm').addEventListener('submit', handleSubmit);
        });
    </script>
</body>
</html>
