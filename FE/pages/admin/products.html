<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm - MARC Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/admin/unified.css">
    <link rel="stylesheet" href="../../css/admin/products.css">
</head>
<body>
    <div class="admin-container">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">MARC</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> DASHBOARD</a></li>
                <li><a href="products.html" class="active"><i class="fas fa-box"></i> SẢN PHẨM</a></li>
                <li><a href="categories.html"><i class="fas fa-tags"></i> DANH MỤC</a></li>
                <li><a href="sizes.html"><i class="fas fa-ruler-combined"></i> BẢNG SIZE</a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> ĐƠN HÀNG</a></li>
                <li><a href="users.html"><i class="fas fa-users"></i> NGƯỜI DÙNG</a></li>
                <li><a href="analytics.html"><i class="fas fa-chart-bar"></i> THỐNG KÊ</a></li>
                <li><hr style="margin: 20px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);"></li>
                <li><a href="../customer/index.html"><i class="fas fa-arrow-left"></i> VỀ TRANG CHỦ</a></li>
                <li><a href="javascript:logout();"><i class="fas fa-sign-out-alt"></i> ĐĂNG XUẤT</a></li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="admin-main">
            <div class="admin-header-section">
                <h1>Quản Lý Sản Phẩm</h1>
                <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Thêm Sản Phẩm</button>
            </div>

            <!-- FILTERS -->
            <div class="card">
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm..." onkeyup="filterProducts()">
                    <select id="categoryFilter" onchange="filterProducts()">
                        <option value="">Tất cả danh mục</option>
                        <option value="ao">Áo</option>
                        <option value="quan">Quần</option>
                        <option value="dam">Đầm</option>
                        <option value="vay">Váy</option>
                    </select>
                    <input type="number" id="minPrice" placeholder="Giá tối thiểu" style="width: 150px;" onchange="filterProducts()">
                    <input type="number" id="maxPrice" placeholder="Giá tối đa" style="width: 150px;" onchange="filterProducts()">
                </div>

                <!-- TABLE -->
                <table>
                    <thead>
                        <tr>
                            <th>Hình Ảnh</th>
                            <th>Tên Sản Phẩm</th>
                            <th>SKU</th>
                            <th>Danh Mục</th>
                            <th>Giá</th>
                            <th>Tồn Kho</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 20px;">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>

                <!-- PAGINATION -->
                <div class="pagination" id="pagination">
                </div>
            </div>
        </div>
    </div>

    <!-- PRODUCT MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Sản Phẩm Mới</h2>
                <button class="close-btn" onclick="closeProductModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="productForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tên Sản Phẩm *</label>
                        <input type="text" id="productName" placeholder="Nhập tên sản phẩm" required>
                    </div>
                    <div class="form-group">
                        <label>SKU *</label>
                        <input type="text" id="productSKU" placeholder="Nhập SKU" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Danh Mục *</label>
                        <select id="productCategory" required>
                            <option value="">Chọn danh mục</option>
                            <option value="ao">Áo</option>
                            <option value="quan">Quần</option>
                            <option value="dam">Đầm</option>
                            <option value="vay">Váy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá (VND) *</label>
                        <input type="number" id="productPrice" placeholder="Nhập giá" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tồn Kho *</label>
                        <input type="number" id="productStock" placeholder="Nhập số lượng" required>
                    </div>
                    <div class="form-group">
                        <label>Chiết Khấu (%)</label>
                        <input type="number" id="productDiscount" placeholder="Nhập chiết khấu" min="0" max="100">
                    </div>
                </div>

                <div class="form-group">
                    <label>Mô Tả *</label>
                    <textarea id="productDescription" placeholder="Nhập mô tả sản phẩm" required></textarea>
                </div>

                <div class="form-group">
                    <label>Hình Ảnh</label>
                    <input type="file" id="productImage" accept="image/*">
                    <small class="field-hint" id="imageFieldHint">Ảnh là bắt buộc khi thêm mới sản phẩm.</small>
                </div>

                <div class="form-group">
                    <label>Kích Cỡ *</label>
                    <select id="productSize" required>
                        <option value="">Chọn kích cỡ</option>
                        <option value="XXS">XXS</option>
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="XXL">XXL</option>
                        <option value="XXXL">XXXL</option>
                        <option value="4XL">4XL</option>
                        <option value="5XL">5XL</option>
                        <option value="6XL">6XL</option>
                        <option value="One Size">One Size</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeProductModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu Sản Phẩm</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common/config.js"></script>
    <script src="../../js/common/api.js"></script>
    <script>
        let allProducts = [];
        let allCategories = [];
        let editingProductId = null;
        let currentPage = 1;
        const itemsPerPage = 10;

        function getErrorMessage(error, fallback = 'Có lỗi xảy ra') {
            return error?.message || fallback;
        }

        function getImageUrl(value) {
            return window.CONFIG?.resolveMediaUrl(value, '../../assets/images/banner1.png') || '../../assets/images/banner1.png';
        }

        function getProductImage(product) {
            return window.CONFIG?.resolveProductImage(product, '../../assets/images/banner1.png') || '../../assets/images/banner1.png';
        }

        function getCategoryName(product) {
            if (product.category?.name) {
                return product.category.name;
            }

            const categoryId = product.category?._id || product.categoryId || product.category;
            const matchedCategory = allCategories.find((category) => String(category._id) === String(categoryId));
            return matchedCategory?.name || 'N/A';
        }

        function getStockValue(product) {
            return Number(product.stock ?? product.quantity ?? 0);
        }

        // Load categories on page load
        async function loadCategories() {
            try {
                const data = await window.CategoryAPI.getCategories();
                
                if (data.success && data.data) {
                    allCategories = data.data;
                    const categoryFilter = document.getElementById('categoryFilter');
                    const productCategory = document.getElementById('productCategory');
                    
                    // Clear existing options (keep first placeholder)
                    const filterPlaceholder = categoryFilter.querySelector('option:first-child');
                    categoryFilter.innerHTML = '';
                    categoryFilter.appendChild(filterPlaceholder);
                    
                    const categoryPlaceholder = productCategory.querySelector('option:first-child');
                    productCategory.innerHTML = '';
                    productCategory.appendChild(categoryPlaceholder);
                    
                    // Add categories
                    data.data.forEach(cat => {
                        const option1 = document.createElement('option');
                        option1.value = cat._id;
                        option1.textContent = cat.name;
                        categoryFilter.appendChild(option1);
                        
                        const option2 = document.createElement('option');
                        option2.value = cat._id;
                        option2.textContent = cat.name;
                        productCategory.appendChild(option2);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
                alert('Lỗi tải danh mục: ' + getErrorMessage(error, 'Không thể tải danh mục'));
            }
        }

        // Load products from API
        async function loadProducts() {
            try {
                const data = await window.ProductAPI.getProducts({ page: 1, limit: 100 });
                
                if (data.success && Array.isArray(data.data)) {
                    allProducts = data.data;
                    filterProducts();
                } else {
                    document.getElementById('productTableBody').innerHTML = 
                        '<tr><td colspan="8" style="text-align: center;">Không có sản phẩm</td></tr>';
                }
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productTableBody').innerHTML = 
                    `<tr><td colspan="8" style="text-align: center; color: red;">${getErrorMessage(error, 'Lỗi tải dữ liệu')}</td></tr>`;
            }
        }

        // Render products to table
        function renderProducts(products) {
            const tbody = document.getElementById('productTableBody');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Không có sản phẩm</td></tr>';
                renderPagination(0);
                return;
            }
            
            tbody.innerHTML = products.map(product => {
                const stock = getStockValue(product);
                const stockStatus = stock > 20 ? 'Còn Hàng' : stock > 0 ? 'Sắp Hết' : 'Hết Hàng';
                const badgeClass = stock > 20 ? 'badge-success' : stock > 0 ? 'badge-warning' : 'badge-danger';
                const imageUrl = getProductImage(product);
                
                return `
                    <tr>
                        <td><img class="product-image" src="${imageUrl}" alt="Product" onerror="this.src='../../assets/images/banner1.png'"></td>
                        <td>${product.name || 'N/A'}</td>
                        <td>${product.sku || 'N/A'}</td>
                        <td>${getCategoryName(product)}</td>
                        <td>${Number(product.currentPrice || product.price || 0).toLocaleString('vi-VN')}₫</td>
                        <td>${stock}</td>
                        <td><span class="status-badge badge ${badgeClass}">${stockStatus}</span></td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="editProduct('${product._id}')">Sửa</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct('${product._id}')">Xóa</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getFilteredProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;

            return allProducts.filter(product => {
                const name = String(product.name || '').toLowerCase();
                const description = String(product.description || '').toLowerCase();
                const categoryId = product.category?._id || product.categoryId || product.category;
                const price = Number(product.currentPrice || product.price || 0);

                const matchSearch = !search || name.includes(search) || description.includes(search);
                const matchCategory = !category || String(categoryId) === String(category);
                const matchPrice = price >= minPrice && price <= maxPrice;
                return matchSearch && matchCategory && matchPrice;
            });
        }

        function renderPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            pagination.innerHTML = '';

            if (totalPages <= 1) {
                return;
            }

            const prevButton = document.createElement('button');
            prevButton.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevButton.disabled = currentPage === 1;
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage -= 1;
                    filterProducts();
                }
            });
            pagination.appendChild(prevButton);

            for (let page = 1; page <= totalPages; page += 1) {
                const button = document.createElement('button');
                button.textContent = page;
                if (page === currentPage) {
                    button.className = 'active';
                }
                button.addEventListener('click', () => {
                    currentPage = page;
                    filterProducts();
                });
                pagination.appendChild(button);
            }

            const nextButton = document.createElement('button');
            nextButton.innerHTML = '<i class="fas fa-chevron-right"></i>';
            nextButton.disabled = currentPage === totalPages;
            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage += 1;
                    filterProducts();
                }
            });
            pagination.appendChild(nextButton);
        }

        function openProductModal() {
            editingProductId = null;
            document.getElementById('productModal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Thêm Sản Phẩm Mới';
            document.getElementById('productForm').reset();
            document.getElementById('imageFieldHint').textContent = 'Ảnh là bắt buộc khi thêm mới sản phẩm.';
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function editProduct(id) {
            const product = allProducts.find((item) => String(item._id) === String(id));
            if (!product) {
                alert('Không tìm thấy sản phẩm');
                return;
            }

            editingProductId = id;
            document.getElementById('productModal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Chỉnh Sửa Sản Phẩm';
            document.getElementById('productName').value = product.name || '';
            document.getElementById('productSKU').value = product.sku || '';
            document.getElementById('productCategory').value = product.category?._id || product.categoryId || product.category || '';
            document.getElementById('productPrice').value = product.price || product.currentPrice || 0;
            document.getElementById('productStock').value = getStockValue(product);
            document.getElementById('productDiscount').value = product.discount || 0;
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productSize').value = Array.isArray(product.sizes) && product.sizes.length ? product.sizes[0] : 'M';
            document.getElementById('productImage').value = '';
            document.getElementById('imageFieldHint').textContent = 'Có thể bỏ trống ảnh nếu bạn không muốn thay đổi ảnh hiện tại.';
        }

        async function deleteProduct(id) {
            if (confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')) {
                try {
                    await window.ProductAPI.deleteProduct(id);
                    allProducts = allProducts.filter((product) => String(product._id) !== String(id));
                    filterProducts();
                    alert('Đã xóa sản phẩm thành công!');
                } catch (error) {
                    console.error('Error deleting product:', error);
                    alert(`Xóa sản phẩm thất bại: ${getErrorMessage(error, 'Không thể xóa sản phẩm')}`);
                }
            }
        }

        function filterProducts() {
            const filtered = getFilteredProducts();
            const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            renderProducts(filtered.slice(start, end));
            renderPagination(filtered.length);
        }

        function logout() {
            if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                clearAuthState();
                window.location.replace('../../pages/auth/login.html');
            }
        }

        function clearAuthState() {
            localStorage.removeItem('marc_auth_token');
            localStorage.removeItem('marc_refresh_token');
            localStorage.removeItem('marc_user_info');
            localStorage.removeItem('authToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('userInfo');
            localStorage.removeItem('user');
            localStorage.removeItem('token');
        }

        function validateAdminAccess(showUnauthorizedMessage = true) {
            const userInfo = localStorage.getItem('marc_user_info') || localStorage.getItem('userInfo');
            const authToken = localStorage.getItem('marc_auth_token') || localStorage.getItem('authToken');

            if (!userInfo || !authToken) {
                window.location.replace('../../pages/auth/login.html');
                return false;
            }

            try {
                const user = JSON.parse(userInfo);
                if (user.role !== 'admin') {
                    if (showUnauthorizedMessage) {
                        alert('Bạn không có quyền truy cập trang này!');
                    }
                    window.location.replace('../../pages/customer/index.html');
                    return false;
                }
            } catch (error) {
                console.error('Error parsing user info:', error);
                clearAuthState();
                window.location.replace('../../pages/auth/login.html');
                return false;
            }

            return true;
        }

        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const description = document.getElementById('productDescription').value.trim();
            if (!description) {
                alert('Vui lòng nhập mô tả sản phẩm');
                return;
            }

            formData.append('name', document.getElementById('productName').value);
            formData.append('sku', document.getElementById('productSKU').value);
            formData.append('description', description);
            formData.append('category', document.getElementById('productCategory').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('discount', document.getElementById('productDiscount').value || 0);
            formData.append('quantity', document.getElementById('productStock').value);
            formData.append('size', document.getElementById('productSize').value);
            
            const imageFile = document.getElementById('productImage').files[0];
            if (!editingProductId && !imageFile) {
                alert('Vui lòng chọn hình ảnh');
                return;
            }
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const data = editingProductId
                    ? await window.ProductAPI.updateProductForm(editingProductId, formData)
                    : await window.ProductAPI.createProductForm(formData);

                if (data.success) {
                    alert(editingProductId ? 'Cập nhật sản phẩm thành công!' : 'Thêm sản phẩm thành công!');
                    closeProductModal();
                    await loadProducts();
                } else {
                    alert('Lỗi: ' + (data.message || 'Không thể lưu sản phẩm'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert(`Lỗi khi lưu sản phẩm: ${getErrorMessage(error, 'Không thể lưu sản phẩm')}`);
            }
        });

        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProductModal();
            }
        });

        // Auth check - prevent infinite redirect loop
        document.addEventListener('DOMContentLoaded', function() {
            if (!validateAdminAccess()) {
                return;
            }

            // Load data
            Promise.all([loadCategories(), loadProducts()]).catch((error) => {
                console.error('Error loading admin product page:', error);
                alert('Lỗi tải trang quản trị sản phẩm: ' + getErrorMessage(error, 'Không thể tải dữ liệu quản trị'));
            });
        });

        window.addEventListener('pageshow', function() {
            validateAdminAccess(false);
        });

        window.openProductModal = openProductModal;
        window.closeProductModal = closeProductModal;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.filterProducts = filterProducts;
        window.logout = logout;
    </script>
</body>
</html>
